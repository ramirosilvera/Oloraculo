name: Deploy a Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'migration/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: migration/package-lock.json

      - name: Instalar dependencias
        working-directory: migration
        run: npm ci

      - name: Build
        working-directory: migration
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Configurar secretos de Pages Functions
        working-directory: migration
        # Solo corre si los secrets están cargados en GitHub Actions.
        # Si no están, el paso se saltea sin pisar los del dashboard de Cloudflare.
        if: ${{ secrets.SERPER_API_KEY != '' && secrets.GEMINI_API_KEY != '' }}
        run: |
          printf '%s' "${{ secrets.SERPER_API_KEY }}" | npx wrangler@3 pages secret put SERPER_API_KEY --project-name=oloraculo
          printf '%s' "${{ secrets.GEMINI_API_KEY }}" | npx wrangler@3 pages secret put GEMINI_API_KEY --project-name=oloraculo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy a Cloudflare Pages (producción)
        working-directory: migration
        run: npx wrangler@3 pages deploy dist --project-name=oloraculo --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
