name: Deploy a Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'migration/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: migration/package-lock.json

      - name: Instalar dependencias
        working-directory: migration
        run: npm ci

      - name: Build
        working-directory: migration
        run: npm run build
        env:
          VITE_FD_API_KEY: ${{ secrets.VITE_FD_API_KEY }}

      - name: Configurar secretos de Pages Functions
        working-directory: migration
        continue-on-error: true
        run: |
          if [ -n "$SERPER_API_KEY" ]; then
            printf '%s' "$SERPER_API_KEY" | npx wrangler@3 pages secret put SERPER_API_KEY --project-name=oloraculo
            printf '%s' "$SERPER_API_KEY" | npx wrangler@3 pages secret put SERPER_API_KEY --project-name=oloraculo --env preview
          fi
          if [ -n "$GEMINI_API_KEY" ]; then
            printf '%s' "$GEMINI_API_KEY" | npx wrangler@3 pages secret put GEMINI_API_KEY --project-name=oloraculo
            printf '%s' "$GEMINI_API_KEY" | npx wrangler@3 pages secret put GEMINI_API_KEY --project-name=oloraculo --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy a Cloudflare Pages (producción)
        working-directory: migration
        run: npx wrangler@3 pages deploy dist --project-name=oloraculo --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
