name: Deploy Edge Functions

# Despliega las Edge Functions de Supabase cuando cambian en main.
# Requiere el secret SUPABASE_ACCESS_TOKEN (Supabase Dashboard → Account →
# Access Tokens). El project-ref es público (está en la URL del proyecto).
#
# Las funciones usan autenticación propia (X-Serper-Key / anon key), por eso
# se despliegan con --no-verify-jwt, igual que su configuración actual.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: wyedmgxngqdgnxmbencl

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy update-goal-scorers
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Falta el secret SUPABASE_ACCESS_TOKEN. Agregalo en Settings → Secrets → Actions."
            exit 1
          fi
          supabase functions deploy update-goal-scorers \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt
