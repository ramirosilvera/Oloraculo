name: Refrescar datos de mercado

# Pega a /api/cron/refresh-all, que calienta TODAS las caches en Supabase en una pasada
# (fx, bonos, riesgo-país, FRED + fundamentos y precios de los tickers realmente tenidos).
# Así la data se actualiza sola sin depender de que la app esté abierta.
# Requiere el secret APP_URL = URL de la app en Cloudflare Pages
# (ej. https://portfolio-inversiones.pages.dev).

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 min
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refrescar todas las caches
        env:
          APP: ${{ secrets.APP_URL }}
        run: |
          [ -z "$APP" ] && { echo "::error::APP_URL no configurada — agregá el secret APP_URL en GitHub"; exit 1; }
          URL="$APP/api/cron/refresh-all"
          echo "→ $URL"
          RESP=$(curl -sS --max-time 120 "$URL")
          echo "Respuesta: $RESP" | head -c 500
          case "$RESP" in
            '{'*'"ok"'*)
              echo ""; echo "✓ refresh-all OK" ;;
            *'<!DOCTYPE'* | *'<html'*)
              echo "::error::APP_URL apunta a un deploy sin la Function (devolvió el HTML de la app). Usá el alias de producción https://portfolio-inversiones.pages.dev (sin hash) y verificá que el último deploy esté en producción."; exit 1 ;;
            *)
              echo "::warning::refresh-all no devolvió el JSON esperado (¿fuente externa caída? se reintenta en el próximo tick)"; exit 0 ;;
          esac
